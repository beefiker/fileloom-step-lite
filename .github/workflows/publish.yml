name: Publish Maven

on:
  workflow_dispatch:
    inputs:
      target:
        description: Maven Central target repository.
        required: true
        default: snapshot
        type: choice
        options:
          - snapshot
          - release
      release_version:
        description: Release version without -SNAPSHOT. Required for manual release publishes.
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish Maven artifact
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Verify parser
        run: ./gradlew check

      - name: Validate snapshot publish inputs
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'snapshot' }}
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: ./scripts/require-maven-central-env.sh snapshot

      - name: Publish snapshot
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'snapshot' }}
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishAllPublicationsToCentralSnapshotsRepository

      - name: Publish release
        if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'release') }}
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_CENTRAL_NAMESPACE: dev.jaeyoung
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          WORKFLOW_RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          ./scripts/require-maven-central-env.sh release

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${WORKFLOW_RELEASE_VERSION}"
          fi

          if [ -z "${VERSION}" ]; then
            echo "release_version is required for manual release publishes."
            exit 1
          fi

          ./gradlew -PreleaseVersion="${VERSION}" publishAllPublicationsToCentralReleaseRepository

          CENTRAL_AUTH="$(printf '%s:%s' "${MAVEN_CENTRAL_USERNAME}" "${MAVEN_CENTRAL_PASSWORD}" | base64 | tr -d '\n')"
          curl --fail-with-body \
            --request POST \
            --header "Authorization: Bearer ${CENTRAL_AUTH}" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/${MAVEN_CENTRAL_NAMESPACE}"
